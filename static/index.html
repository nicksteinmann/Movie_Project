<html>
<head>
    <title>My Movie App</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="list-movies-title">
    <h1>My Movie App</h1>
</div>
<div>
    <ol class="movie-grid">

        <li>
            <div class="movie">

                     alt="Matrix poster"/>
                <div class="movie-title">Matrix</div>
                <div class="movie-year">1993</div>
            </div>
        </li>

        <li>
            <div class="movie">
                <img class="movie-poster"
                     src="https://m.media-amazon.com/images/M/MV5BYzYyN2FiZmUtYWYzMy00MzViLWJkZTMtOGY1ZjgzNWMwN2YxXkEyXkFqcGc@._V1_SX300.jpg"

                <div class="movie-year">1997</div>
            </div>
        </li>

        <li>
            <div class="movie">
                <img class="movie-poster"
                     src="https://m.media-amazon.com/images/M/MV5BMDEzMmQwZjctZWU2My00MWNlLWE0NjItMDJlYTRlNGJiZjcyXkEyXkFqcGc@._V1_SX300.jpg"
                     alt="Avatar poster"/>

                <div class="movie-year">2009</div>
            </div>
        </li>

        <li>
            <div class="movie">
                <img class="movie-poster"
                     src="https://m.media-amazon.com/images/M/MV5BZGRiZDZhZjItM2M3ZC00Y2IyLTk3Y2MtMWY5YjliNDFkZTJlXkEyXkFqcGc@._V1_SX300.jpg"
                     alt="The Lion King poster"/>
                <div class="movie-title">The Lion King</div>
                <div class="movie-year">1994</div>
            </div>
        </li>

        <li>
            <div class="movie">
                <img class="movie-poster"
                     src="https://m.media-amazon.com/images/M/MV5BNGI3Mjc1ZjUtYTJhYS00NjBiLTgyYjctODU5NTNlMWJiYjYzXkEyXkFqcGc@._V1_SX300.jpg"

                <div class="movie-year">1998</div>
            </div>
        </li>

        <li>
            <div class="movie">
                <img class="movie-poster"
                     src="https://m.media-amazon.com/images/M/MV5BODM4ZjZjMGEtYmFiMy00MThjLWIzZjUtMDU0ODg1NTI2MzIwXkEyXkFqcGc@._V1_SX300.jpg"
                     alt="The Iron Giant poster"/>
                <div class="movie-title">The Iron Giant</div>
                <div class="movie-year">1999</div>
            </div>
        </li>

    </ol>
</div>
</body>
</html>
